<header style="display:flex;align-items:center;justify-content:space-between;padding:23px 34px;background:#fff;border-bottom:1px solid #ececec;">
  <a href="{% url 'store:home' %}" style="font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#212123;">PrimePantry</a>
  <div style="display:flex;align-items:center;gap:23px;">
    <a href="{% url 'store:catalog' %}" style="font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#212123;">Catalog</a>
    <a href="{% url 'store:cart' %}" style="font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#212123;">Cart{% if cart_count %} ({{ cart_count }}){% endif %}</a>
    {% if user.is_authenticated %}
    <a href="{% url 'store:my_orders' %}" style="font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#212123;">My orders</a>
    <form method="post" action="{% url 'store:logout' %}" style="margin:0;">{% csrf_token %}<button type="submit" style="background:none;border:none;padding:0;cursor:pointer;font-family:'Jost',sans-serif;font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#999999;">Log out</button></form>
    {% else %}
    <a href="{% url 'store:auth' %}" style="font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#999999;">Account</a>
    {% endif %}
  </div>
</header>
