<header class="site-header" style="display:flex;align-items:center;justify-content:space-between;padding:23px 34px;background:#fff;border-bottom:1px solid #ececec;gap:18px;">
  <a href="{% url 'store:home' %}" style="font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#212123;">PrimePantry</a>
  <div class="site-header-nav" style="display:flex;align-items:center;gap:23px;">
    <a href="{% url 'store:catalog' %}" style="font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#212123;">Catalog</a>
    <a href="{% url 'store:cart' %}" style="font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#212123;">Cart{% if cart_count %} ({{ cart_count }}){% endif %}</a>
    {% if user.is_authenticated %}
    <a href="{% url 'store:account' %}" style="font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#999999;">Account</a>
    {% else %}
    <a href="{% url 'store:auth' %}" style="font-size:11px;line-height:1;letter-spacing:1.5px;text-transform:uppercase;color:#999999;">Account</a>
    {% endif %}
  </div>
</header>
